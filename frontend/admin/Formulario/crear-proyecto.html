<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Proyecto </title>
    <link rel="shortcut icon" href="../Formulario/imagenes/lupa.png" type="image/x-icon">
    <link rel="stylesheet" href="estilo-unificado.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body onload="abrirTabDirectamente('crear-proyecto')">
    <!-- Contenedor principal con pestañas -->
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-clipboard-list"></i> Crear Nuevo Proyecto </h1>
            <p>Creación de proyectos en la plataforma </p>
        </div>

        <!-- Solo MOSTRAMOS la pestaña que nos interesa -->
        <div class="tabs" style="display: none;">
            <!-- Ocultamos las pestañas pero mantenemos la estructura para el JavaScript -->
            <button class="tab-button" onclick="abrirTab('crear-proyecto')" id="tab-crear-proyecto">
                <i class="fas fa-plus-circle"></i> Crear en OpenProject
            </button>
        </div>

        <!-- Contenido de las pestañas -->
        <div class="tab-content">

            <!-- Pestaña 2: Crear Proyecto OpenProject -->
            <div id="crear-proyecto" class="tab-pane active">
                <div class="form-container">
                    <form id="crearProyectoForm">
                        <div class="form-section">
                            <h2 class="section-title"><i class="fas fa-info-circle"></i> Información</h2>
                            <div class="form-grid">
                                <div class="form-group full-width">
                                    <label for="nombre" class="required">Nombre del Proyecto</label>
                                    <input type="text" id="nombre" name="nombre" required
                                        placeholder="Ej: Desarrollo Backend">
                                </div>

                                <div class="form-group">
                                    <label for="identificador" class="required">Identificador</label>
                                    <div class="input-with-button">
                                        <input type="text" id="identificador" name="identificador" required
                                            placeholder="ej-proyecto-01">
                                        <button type="button" onclick="generarIdentificador()"><i
                                                class="fas fa-magic"></i></button>
                                    </div>
                                </div>

                                <div class="form-group full-width">
                                    <label for="descripcion">Descripción</label>
                                    <textarea id="descripcion" name="descripcion"></textarea>
                                </div>
                            </div>
                        </div>

                        <div class="form-section">
                            <h2 class="section-title"><i class="fas fa-users"></i> Responsables</h2>
                            <div class="form-grid">
                                <div class="form-group">
                                    <label for="responsable" class="required">Responsable</label>
                                    <input type="text" id="responsable" name="responsable" required>
                                </div>
                                <input type="hidden" id="author_id" name="author_id" value="1">
                            </div>
                        </div>

                        <div class="form-section">
                            <h2 class="section-title"><i class="fas fa-calendar"></i> Cronograma</h2>
                            <div class="form-grid">
                                <div class="form-group">
                                    <label for="fecha_inicio">Fecha Inicio</label>
                                    <input type="date" id="fecha_inicio" name="fecha_inicio">
                                </div>
                                <div class="form-group">
                                    <label for="fecha_fin">Fecha Fin</label>
                                    <input type="date" id="fecha_fin" name="fecha_fin">
                                </div>
                            </div>
                        </div>

                        <div class="btn-group">
                            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Guardar
                                Proyecto</button>
                        </div>
                        <div class="navigation-actions">
                            <button type="button" class="btn-back" onclick="retroceder()">
                                <i class="fas fa-arrow-left"></i> Volver
                            </button>
                        </div>
                    </form>

                    <div id="mensajeResultado" class="mensaje-resultado" style="display: none;">
                        <div class="icono-resultado" id="iconoResultado"></div>
                        <h3 id="tituloResultado"></h3>
                        <p id="textoResultado"></p>
                        <div id="detallesProyecto" class="detalles-proyecto" style="display: none;">
                            <h4>Información de Registro:</h4>
                            <p><strong>ID Sistema:</strong> <span id="proyectoId"></span></p>
                            <p><strong>Nombre:</strong> <span id="proyectoNombre"></span></p>
                            <p><strong>Código:</strong> <span id="proyectoIdentificador"></span></p>
                            <p><strong>Acción:</strong> <a id="proyectoEnlace" href="#">Ver ficha técnica</a></p>
                        </div>
                        <button class="btn-cerrar" onclick="cerrarMensaje()">Aceptar</button>
                    </div>
                </div>
            </div>

            <script src="script-unificado.js"></script>

            <!-- Script adicional para asegurar que se abra directamente -->


            <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
            <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</body>

</html>
