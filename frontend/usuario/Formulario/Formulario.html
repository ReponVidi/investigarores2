<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha Técnica - Proyecto Especial UNEFA</title>
    <link rel="shortcut icon" href="../Formulario/imagenes/lupa.png" type="image/x-icon">
    <link rel="stylesheet" href="estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-clipboard-list"></i> Ficha Técnica</h1>
            <p>Proyecto Especial UNEFA</p>
        </div>

        <div class="form-container">
            <form id="fichaTecnicaForm">
                <!-- Sección de Información General -->
                <div class="form-section">
                    <h2 class="section-title">
                        <i class="fas fa-info-circle"></i> Información General del Proyecto
                    </h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="nombreProyecto" class="required">Nombre del Proyecto</label>
                            <input type="text" id="nombreProyecto" name="nombreProyecto" required>
                        </div>
                        <div class="form-group">
                            <label for="codigoProyecto" class="required">Código del Proyecto</label>
                            <input type="text" id="codigoProyecto" name="codigoProyecto" required>
                        </div>
                        <div class="form-group">
                            <label for="fechaInicio" class="required">Fecha de Inicio</label>
                            <input type="date" id="fechaInicio" name="fechaInicio" required>
                        </div>
                        <div class="form-group">
                            <label for="fechaFin" class="required">Fecha de Finalización</label>
                            <input type="date" id="fechaFin" name="fechaFin" required>
                        </div>
                        <div class="form-group full-width">
                            <label for="descripcion" class="required">Descripción del Proyecto</label>
                            <textarea id="descripcion" name="descripcion" required></textarea>
                        </div>
                    </div>
                </div>

                <!-- Sección de Responsables -->
                <div class="form-section">
                    <h2 class="section-title">
                        <i class="fas fa-users"></i> Responsables del Proyecto
                    </h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="directorProyecto" class="required">Director del Proyecto</label>
                            <input type="text" id="directorProyecto" name="directorProyecto" required>
                        </div>
                        <div class="form-group">
                            <label for="coordinador" class="required">Coordinador</label>
                            <input type="text" id="coordinador" name="coordinador" required>
                        </div>
                        <div class="form-group">
                            <label for="tutorAcademico">Tutor Académico</label>
                            <input type="text" id="tutorAcademico" name="tutorAcademico">
                        </div>
                        <div class="form-group">
                            <label>Equipo de Trabajo</label>

                            <div id="equipoContainer" class="equipo-container">
                                <!-- Primer campo -->
                                <div class="equipo-item">
                                    <input type="text" name="equipoTrabajo[]" placeholder="Nombre del integrante">
                                    <button type="button" class="btn-add" onclick="agregarIntegrante()">+</button>
                                </div>
                            </div>
                        </div>


                    </div>
                </div>

                <!-- Sección de Objetivos -->
                <div class="form-section">
                    <h2 class="section-title">
                        <i class="fas fa-bullseye"></i> Objetivos del Proyecto
                    </h2>
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label for="objetivoGeneral" class="required">Objetivo General</label>
                            <textarea id="objetivoGeneral" name="objetivoGeneral" required></textarea>
                        </div>
                        <label>Objetivos Específicos</label>

                        <div style="display:flex; gap:20px; align-items:flex-start;">

                            <!-- CONTENEDOR DE OBJETIVOS -->
                            <div id="objetivos-especificos-container" style="width:350px;">
                                <div class="objetivo-item" style="display:flex; gap:10px; margin-bottom:5px;">
                                    <input type="text" name="objetivos_especificos[]" class="form-control" placeholder="Escribe un objetivo específico">

                                    <!-- botón X corregido -->
                                    <button type="button" class="btn btn-danger remove-btn">X</button>
                                </div>
                            </div>

                            <!-- BOTÓN AGREGAR -->
                            <button type="button" 
                                    class="btn btn-success" 
                                    onclick="addObjetivo()" 
                                    style="width:200px; height:150px;">
                                Agregar
                            </button>

                        </div>


                <!-- Sección de Recursos -->
                <div class="form-section">
                    <h2 class="section-title">
                        <i class="fas fa-tools"></i> Recursos y Presupuesto
                    </h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="presupuestoTotal" class="required">Presupuesto Total</label>

                            <div class="input-with-suffix">
                                <input type="number" id="presupuestoTotal" name="presupuestoTotal" step="0.01" required>
                                <span class="suffix">Bs</span>
                            </div>
                        </div>

                        
                        <div class="form-group full-width">
                            <label for="recursosMateriales">Recursos Materiales Necesarios</label>
                            <textarea id="recursosMateriales" name="recursosMateriales"></textarea>
                        </div>
                        <div class="form-group full-width">
                            <label for="recursosHumanos">Recursos Humanos</label>
                            <textarea id="recursosHumanos" name="recursosHumanos"></textarea>
                        </div>
                    </div>
                </div>

                <!-- Sección de Cronograma -->
                <div class="form-section">
                    <h2 class="section-title">
                        <i class="fas fa-calendar-alt"></i> Cronograma de Actividades
                    </h2>
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label for="actividadesPrincipales">Actividades Principales</label>
                            <textarea id="actividadesPrincipales" name="actividadesPrincipales"></textarea>
                        </div>
                        <div class="form-group full-width">
                            <label for="entregables">Entregables Principales</label>
                            <textarea id="entregables" name="entregables"></textarea>
                        </div>
                    </div>
                </div>
                <!-- Agrega esto en tu formulario existente -->

                <!-- Nueva Sección: Datos Específicos de la Plantilla -->
                <div class="form-section">
                    <h2 class="section-title">
                        <i class="fas fa-university"></i> Datos de la Unidad
                    </h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="unidad">Unidad</label>
                            <input type="text" id="unidad" name="unidad">
                        </div>
                        <div class="form-group">
                            <label for="adscripcion">Adscripción</label>
                            <input type="text" id="adscripcion" name="adscripcion">
                        </div>
                        <div class="form-group">
                            <label for="grado">Grado</label>
                            <input type="text" id="grado" name="grado">
                        </div>
                        <div class="form-group">
                            <label for="nombresApellidos">Nombres y Apellidos</label>
                            <input type="text" id="nombresApellidos" name="nombresApellidos">
                        </div>
                        <div class="form-group">
                            <label for="liderProyecto">Líder del Proyecto</label>
                            <input type="text" id="liderProyecto" name="liderProyecto">
                        </div>
                        <div class="form-group">
                            <label for="telefono">Teléfono Móvil</label>
                            <input type="text" id="telefono" name="telefono">
                        </div>
                        <div class="form-group">
                            <label for="tituloProyecto">Título del Proyecto</label>
                            <input type="text" id="tituloProyecto" name="tituloProyecto">
                        </div>
                        <div class="form-group">
                            <label for="alcance">Alcance</label>
                            <input type="text" id="alcance" name="alcance">
                        </div>
                    </div>
                </div>

                <!-- Otras secciones específicas -->
                <div class="form-section">
                    <h2 class="section-title">
                        <i class="fas fa-list"></i> Información Adicional
                    </h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="justificacion">Justificación</label>
                            <textarea id="justificacion" name="justificacion"></textarea>
                        </div>
                        <div class="form-group">
                            <label for="montoPrototipo">Monto para Prototipo</label>
                            <input type="text" id="montoPrototipo" name="montoPrototipo">
                        </div>
                        <div class="form-group">
                            <label for="duracionProyecto">Duración del Proyecto</label>
                            <input type="text" id="duracionProyecto" name="duracionProyecto" placeholder="Ej: 12 MESES">
                        </div>
                    </div>
                </div>

                <div class="form-note">
                    <p><span class="required"></span> Campos obligatorios</p>
                </div>

                <div class="btn-group">
                    <button type="button" class="btn btn-secondary" onclick="limpiarFormulario()">
                        <i class="fas fa-eraser"></i> Limpiar Formulario
                    </button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Guardar Ficha Técnica
                    </button>
                    <button type="button" class="btn btn-success" onclick="generarPDF()">
                        <i class="fas fa-file-pdf"></i> Generar PDF
                    </button>
                </div>
            </form>
        </div>
    </div>



    <script src="script.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</body>

</html>
