<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilo.css">
    <title>Ficha Técnica - Proyecto Especial UNEFA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: #1a237e;
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 16px;
        }

        .form-container {
            padding: 30px;
        }

        .form-section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            background: #f8f9fa;
        }

        .section-title {
            font-size: 20px;
            color: #1a237e;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #1a237e;
            display: flex;
            align-items: center;
        }

        .section-title i {
            margin-right: 10px;
            font-size: 24px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #1a237e;
            box-shadow: 0 0 0 3px rgba(26, 35, 126, 0.1);
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .btn {
            padding: 14px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: #1a237e;
            color: white;
        }

        .btn-primary:hover {
            background: #283593;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(26, 35, 126, 0.3);
        }

        .btn-secondary {
            background: #757575;
            color: white;
        }

        .btn-secondary:hover {
            background: #616161;
            transform: translateY(-2px);
        }

        .required::after {
            content: " *";
            color: #d32f2f;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .btn-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }

        .form-note {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-style: italic;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-clipboard-list"></i> Ficha Técnica</h1>
            <p>Proyecto Especial UNEFA</p>
        </div>

        <div class="form-container">
            <form id="fichaTecnicaForm">
                <!-- Sección de Información General -->
                <div class="form-section">
                    <h2 class="section-title">
                        <i class="fas fa-info-circle"></i> Información General del Proyecto
                    </h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="nombreProyecto" class="required">Nombre del Proyecto</label>
                            <input type="text" id="nombreProyecto" name="nombreProyecto" required>
                        </div>
                        <div class="form-group">
                            <label for="codigoProyecto" class="required">Código del Proyecto</label>
                            <input type="text" id="codigoProyecto" name="codigoProyecto" required>
                        </div>
                        <div class="form-group">
                            <label for="fechaInicio" class="required">Fecha de Inicio</label>
                            <input type="date" id="fechaInicio" name="fechaInicio" required>
                        </div>
                        <div class="form-group">
                            <label for="fechaFin" class="required">Fecha de Finalización</label>
                            <input type="date" id="fechaFin" name="fechaFin" required>
                        </div>
                        <div class="form-group full-width">
                            <label for="descripcion" class="required">Descripción del Proyecto</label>
                            <textarea id="descripcion" name="descripcion" required></textarea>
                        </div>
                    </div>
                </div>

                <!-- Sección de Responsables -->
                <div class="form-section">
                    <h2 class="section-title">
                        <i class="fas fa-users"></i> Responsables del Proyecto
                    </h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="directorProyecto" class="required">Director del Proyecto</label>
                            <input type="text" id="directorProyecto" name="directorProyecto" required>
                        </div>
                        <div class="form-group">
                            <label for="coordinador" class="required">Coordinador</label>
                            <input type="text" id="coordinador" name="coordinador" required>
                        </div>
                        <div class="form-group">
                            <label for="tutorAcademico">Tutor Académico</label>
                            <input type="text" id="tutorAcademico" name="tutorAcademico">
                        </div>
                        <div class="form-group">
                            <label for="equipoTrabajo">Equipo de Trabajo</label>
                            <textarea id="equipoTrabajo" name="equipoTrabajo"></textarea>
                        </div>
                    </div>
                </div>

                <!-- Sección de Objetivos -->
                <div class="form-section">
                    <h2 class="section-title">
                        <i class="fas fa-bullseye"></i> Objetivos del Proyecto
                    </h2>
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label for="objetivoGeneral" class="required">Objetivo General</label>
                            <textarea id="objetivoGeneral" name="objetivoGeneral" required></textarea>
                        </div>
                        <div class="form-group full-width">
                            <label for="objetivosEspecificos">Objetivos Específicos</label>
                            <textarea id="objetivosEspecificos" name="objetivosEspecificos"></textarea>
                        </div>
                    </div>
                </div>

                <!-- Sección de Recursos -->
                <div class="form-section">
                    <h2 class="section-title">
                        <i class="fas fa-tools"></i> Recursos y Presupuesto
                    </h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="presupuestoTotal" class="required">Presupuesto Total</label>
                            <input type="number" id="presupuestoTotal" name="presupuestoTotal" step="0.01" required>
                        </div>
                        <div class="form-group">
                            <label for="moneda">Moneda</label>
                            <select id="moneda" name="moneda">
                                <option value="USD">Dólares (USD)</option>
                                <option value="EUR">Euros (EUR)</option>
                                <option value="VES" selected>Bolívares (VES)</option>
                            </select>
                        </div>
                        <div class="form-group full-width">
                            <label for="recursosMateriales">Recursos Materiales Necesarios</label>
                            <textarea id="recursosMateriales" name="recursosMateriales"></textarea>
                        </div>
                        <div class="form-group full-width">
                            <label for="recursosHumanos">Recursos Humanos</label>
                            <textarea id="recursosHumanos" name="recursosHumanos"></textarea>
                        </div>
                    </div>
                </div>

                <!-- Sección de Cronograma -->
                <div class="form-section">
                    <h2 class="section-title">
                        <i class="fas fa-calendar-alt"></i> Cronograma de Actividades
                    </h2>
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label for="actividadesPrincipales">Actividades Principales</label>
                            <textarea id="actividadesPrincipales" name="actividadesPrincipales"></textarea>
                        </div>
                        <div class="form-group full-width">
                            <label for="entregables">Entregables Principales</label>
                            <textarea id="entregables" name="entregables"></textarea>
                        </div>
                    </div>
                </div>

                <div class="form-note">
                    <p><span class="required"></span> Campos obligatorios</p>
                </div>

                <div class="btn-group">
                    <button type="button" class="btn btn-secondary" onclick="limpiarFormulario()">
                        <i class="fas fa-eraser"></i> Limpiar Formulario
                    </button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Guardar Ficha Técnica
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('fichaTecnicaForm').addEventListener('submit', function (e) {
            e.preventDefault();

            // Validar fechas
            const fechaInicio = new Date(document.getElementById('fechaInicio').value);
            const fechaFin = new Date(document.getElementById('fechaFin').value);

            if (fechaFin < fechaInicio) {
                alert('La fecha de finalización no puede ser anterior a la fecha de inicio.');
                return;
            }

            // Aquí puedes agregar la lógica para guardar los datos
            // Por ejemplo, enviar a un servidor o guardar localmente

            alert('¡Ficha técnica guardada exitosamente!');
            // Limpiar el formulario después de guardar
            limpiarFormulario();
        });

        function limpiarFormulario() {
            document.getElementById('fichaTecnicaForm').reset();
        }

        // Establecer fecha mínima para la fecha de inicio (hoy)
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('fechaInicio').min = today;

        // Actualizar fecha mínima de fin cuando cambia la fecha de inicio
        document.getElementById('fechaInicio').addEventListener('change', function () {
            document.getElementById('fechaFin').min = this.value;
        });
    </script>
    <script src="script.js"></script>
</body>

</html>
