<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Usuario en OpenProject</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <h1>Gestor de Usuarios OpenProject</h1>
    <p>Crea nuevos usuarios directamente desde esta interfaz.</p>

    <form id="userForm">
      <div class="form-group">
        <label for="login">Usuario</label>
        <input type="text" id="login" name="login" required>
      </div>

      <div class="form-group">
        <label for="firstName">Nombres</label>
        <input type="text" id="firstName" name="firstName" required>
      </div>

      <div class="form-group">
        <label for="lastName">Apellidos</label>
        <input type="text" id="lastName" name="lastName" required>
      </div>

      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="form-group">
        <label for="password">Contraseña Inicial (Minimo 10 Caracteres)</label>
        <input type="password" id="password" name="password" required minlength="8">
      </div>

      <button type="submit" class="btn">Crear Usuario</button>
      <button type="button" id="loginOpenProject" class="btn">Iniciar sesión con OpenProject</button>
    </form>

    <div id="message" class="message"></div>
  </div>

  <div class="mensaje-exito" id="mensajeExito">
    <div class="icono">✓</div>
    <h3>¡Registro Exitoso!</h3>
    <p>El usuario ha sido registrado correctamente</p>
    <button class="btn-cerrar">Cerrar</button>
  </div>

  <script src="script.js"></script>
  <script>
      document.getElementById("loginOpenProject").addEventListener("click", () => {
        window.location.href = "http://localhost:4000/auth/openproject";
      });
  </script>

</body>

</html>
