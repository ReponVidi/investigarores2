<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VIDI UNEFA</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="main-container">
        <section class="info-panel">
            <div class="brand">
                <img src="imagenes/unefalogo.png" alt="Logo UNEFA" class="logo">
                <h1>UNEFA</h1>
                <p class="slogan">"Honor, Lealtad, Patriotismo"</p>
            </div>

            <div class="info-card">
                <h3><i data-lucide="info"></i> Acceso al Sistema</h3>
                <div class="info-grid">
                    <div class="item">
                        <strong>Plataforma VIDI</strong>
                        <p>Gestión centralizada de proyectos de investigación.</p>
                    </div>
                    <div class="item">
                        <strong>Soporte</strong>
                        <p>Lunes a Viernes: 8:00 AM - 5:00 PM</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="form-panel">
            <div class="form-card">
                <div class="form-header">
                    <i data-lucide="user-circle" class="user-icon"></i>
                    <h2>Inicio de Sesión</h2>
                    <p>Sistema de Gestión de Proyectos VIDI</p>
                </div>

                <form id="loginForm">

                    <div class="input-group">
                        <label>Usuario</label>
                        <input type="text" id="username" required>
                    </div>

                    <div class="input-group">
                        <label>Contraseña</label>
                        <input type="password" id="password" required>
                    </div>

                    <button type="submit" class="btn-submit">
                        <i data-lucide="log-in"></i> Ingresar al Sistema
                    </button>

                </form>
               

                <p class="footer-link">¿No tienes cuenta? <a href="/registro" id="">Regístrate aquí</a></p>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>

</html>
